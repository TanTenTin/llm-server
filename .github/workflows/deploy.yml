name: deploy-llm-server

# app/ · 의존성 · Docker · compose 변경 시 서버가 git pull 후 재빌드·기동한다.
# 배포 전 pytest 게이트: 테스트가 깨지면 운영에 나가지 않는다.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      # 서버가 직접 git pull 후 재빌드·기동. (.env는 gitignore라 reset --hard가 건드리지 않음)
      - name: Deploy via git pull
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/llm-server
            git fetch --prune origin
            git reset --hard origin/main
            docker compose up -d --build
