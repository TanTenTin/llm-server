# llm-server 단독 compose (Oracle).
#
# Ollama(로컬-LLM)는 이 호스트가 아니라 "원격 로컬-LLM 서버"를 사용한다.
# 게이트웨이는 OLLAMA_BASE_URL(서버 .env)로 그 원격 주소에 접속한다.
# (예: 같은 tailnet의 Tailscale IP → http://100.x.y.z:11434)
#
# - llm-server: FastAPI 게이트웨이. 호스트 127.0.0.1:8000만 퍼블리시해
#               같은 호스트의 nginx(+Cloudflare)가 프록시한다.
#
# 인증/시크릿/업스트림 주소(ANTHROPIC_API_KEY, GATEWAY_API_KEY, OLLAMA_BASE_URL)는
# 서버의 ~/llm-server/.env 에 둔다(git 제외).
name: llm-server

services:
  llm-server:
    build: .
    restart: unless-stopped
    env_file:
      - .env # GATEWAY_API_KEY, GOOGLE_AI_API_KEY, ANTHROPIC_API_KEY,
             # OLLAMA_BASE_URL=http://<원격 로컬-LLM 주소>:11434 등
    ports:
      - "127.0.0.1:8000:8000" # 로컬만 공개. 외부 노출은 nginx(+Cloudflare)가 담당
